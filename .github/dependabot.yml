# Dependabot will run on day 6 of each month at 03:30 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 15

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 15
